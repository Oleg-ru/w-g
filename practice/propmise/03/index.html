<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>TODO APP</title>
  </head>
  <body>
    <h1 class="title rainbow">Todo APP</h1>
    <div id="overlay">
      <div id="spinner"></div>
    </div>

    <form id="signup-form">
      <h2>Регистрация</h2>
      <input id="signup-email" type="email" placeholder="Email" required autocomplete="current-email">
      <input id="signup-password" type="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="signup-btn">Зарегистрироваться</button>
      <div class="or-signIn">или <span id="signIn" type="button">Войдите</span></div>
    </form>

    <form id="signin-form">
      <h2>Авторизация</h2>
      <input id="signin-email" type="email" placeholder="Email" required autocomplete="current-email">
      <input id="signin-password" type="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="signIn">Войти</button>
    </form>
    <div id="task-container">
      <div class="input-block">
        <input type="text" id="task-input" placeholder="Введите задачу" />
        <button id="add-button">
          <img src="assets/icons/icon-add.png" class="icons" alt="add task"/>
        </button>
      </div>

      <div id="posts-container"></div>
      <button id="delete-completed-button">Удалить все выполненные задачи</button>
    </div>
    <script src="./src/app.js" type="module"></script>
  </body>
</html>
